<!-- design a webpage exploring various UI Interaction Patterns -->

<!DOCTYPE html>
<html>
<head>

<title>Simple Login</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f2f2f2;
    font-family:Arial, sans-serif;
}

/* Login Box */

.login-box{
    width:280px;
    padding:30px;
    background:white;
    border-radius:8px;
    text-align:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* Heading */

.login-box h2{
    color:#333;
    margin-bottom:20px;
}

/* Input Fields */

.login-box input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
    outline:none;
}

/* Button */

.login-box button{
    width:100%;
    padding:10px;
    margin-top:15px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

.login-box button:hover{
    background:#45a049;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Login</h2>

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button>Login</button>

</div>

</body>
</html>
