<!-- define the look and feel of the new project --> 

<!DOCTYPE html>
<html>
<head>

<title>Ex.No.8 Look and Feel</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial, sans-serif;

/* Animated Gradient Background */

background:linear-gradient(270deg,#141e30,#243b55,#1f4068);
background-size:600% 600%;
animation:bgMove 10s ease infinite;
}

/* Background Animation */

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Main Card */

.box{
background:#ffffff;
padding:50px;
border-radius:15px;
text-align:center;
width:320px;

box-shadow:0 10px 30px rgba(0,0,0,0.3);

/* Fade animation */

animation:fadeIn 2s ease;
}

/* Card Fade Animation */

@keyframes fadeIn{
0%{
opacity:0;
transform:translateY(40px);
}

100%{
opacity:1;
transform:translateY(0);
}
}

/* Title */

.title{
font-size:40px;
font-weight:bold;
color:#333;
margin-bottom:10px;

/* Title animation */

animation:slideDown 1.5s ease;
}

@keyframes slideDown{
0%{
transform:translateY(-30px);
opacity:0;
}

100%{
transform:translateY(0);
opacity:1;
}
}

/* Subtitle */

p{
color:#666;
font-size:18px;
margin-bottom:20px;
}

/* Button */

button{
padding:10px 25px;
border:none;
border-radius:25px;
background:#007bff;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

/* Button Hover */

button:hover{
background:#0056b3;
transform:scale(1.1);
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

</style>

</head>

<body>

<div class="box">

<div class="title">Look & Feel</div>

<p>Project Design Demo</p>

<button>Explore</button>

</div>

</body>
</html>
